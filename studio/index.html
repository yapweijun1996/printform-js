<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintForm Studio</title>
  <link rel="stylesheet" href="./studio.css">
  <script src="./mustache-lite.js"></script>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span class="brand">PrintForm Studio</span>
      <select id="template-select" title="Template"></select>
      <button id="import-html" data-i18n="import"></button>
      <input id="import-file-input" type="file" accept=".html,.htm" style="display:none;">
      <button id="compare-toggle" data-i18n="compare"></button>
      <button id="mode-toggle" data-i18n="modeStructure"></button>
      <span class="spacer"></span>
      <button id="toggle-config" data-i18n="panelConfig"></button>
      <button id="toggle-inspector" data-i18n="panelInspector"></button>
      <button id="lang-toggle">EN</button>
      <button id="print-preview" data-i18n="printPreview"></button>
      <div class="more-menu-wrap" id="more-menu-wrap">
        <button id="more-menu-toggle" aria-haspopup="true" aria-expanded="false" data-i18n-aria-label="moreMenu">&ctdot;</button>
        <div id="more-menu" role="menu"></div>
      </div>
      <button id="export-html" class="primary" data-i18n="export"></button>
    </header>

    <div id="restore-banner" class="restore-banner" style="display:none;" role="status">
      <span id="restore-banner-text"></span>
      <button id="restore-banner-reset" data-i18n="resetAll"></button>
      <button id="restore-banner-dismiss" aria-label="Dismiss">&times;</button>
    </div>

    <div id="main">
      <aside id="config-pane" class="pane">
        <button id="close-config" class="pane-close" data-i18n-aria-label="panelConfig" aria-label="Close">&times;</button>
        <input id="config-search" type="search" data-i18n-placeholder="search">
        <div id="ab-selector">
          <button id="side-a-btn" class="active">A</button>
          <button id="side-b-btn">B</button>
        </div>

        <div id="block-editor" style="display:none;">
          <div class="be-row-slider">
            <label data-i18n="rowCount"></label>
            <input type="range" id="row-count-range" min="0" max="60" value="0">
            <span id="row-count-value">0</span>
          </div>
          <div id="be-selected" style="display:none;">
            <div class="be-type-badge" id="be-type"></div>
            <textarea id="be-html" spellcheck="false"></textarea>
            <div class="be-actions">
              <button id="be-apply" class="primary" data-i18n="apply"></button>
              <button id="be-duplicate" data-i18n="duplicate"></button>
              <button id="be-delete" data-i18n="delete"></button>
            </div>
          </div>
          <p class="hint" id="be-hint" data-i18n="clickBlockHint"></p>
        </div>

        <div id="config-groups"></div>
      </aside>

      <section id="preview-pane">
        <div class="preview-slot" id="slot-a">
          <div class="slot-head"><span class="badge">A</span><span id="status-a"></span><span class="zoom-readout" id="zoom-a"></span></div>
          <div class="preview-viewport" id="viewport-a">
            <div class="page-scale-sizer" id="sizer-a">
              <iframe id="frame-a" title="Preview A"></iframe>
            </div>
          </div>
        </div>
        <div class="preview-slot" id="slot-b" style="display:none;">
          <div class="slot-head"><span class="badge">B</span><span id="status-b"></span><span class="zoom-readout" id="zoom-b"></span>
            <button id="copy-a-to-b" style="margin-left:auto;font-size:11px;" data-i18n="copyAB"></button>
          </div>
          <div class="preview-viewport" id="viewport-b">
            <div class="page-scale-sizer" id="sizer-b">
              <iframe id="frame-b" title="Preview B"></iframe>
            </div>
          </div>
        </div>
      </section>

      <aside id="inspector-pane" class="pane">
        <button id="close-inspector" class="pane-close" data-i18n-aria-label="panelInspector" aria-label="Close">&times;</button>
        <details id="data-panel" class="data-panel">
          <summary data-i18n="dataBinding"></summary>
          <p class="hint" id="data-empty-hint" data-i18n="dataEmptyHint"></p>
          <textarea id="data-json" spellcheck="false" style="display:none;"></textarea>
          <p class="hint error" id="data-json-error" style="display:none;"></p>
          <div class="actions" id="data-actions" style="display:none;">
            <button id="data-regenerate" data-i18n="regenerateData"></button>
            <button id="data-export-package" data-i18n="exportPackage"></button>
          </div>
        </details>

        <h3 data-i18n="inspector"></h3>
        <div class="metrics">
          <div class="metric"><div class="value" id="m-logical">–</div><div class="name" data-i18n="logicalPages"></div></div>
          <div class="metric"><div class="value" id="m-physical">–</div><div class="name" data-i18n="physicalPages"></div></div>
        </div>
        <div class="actions">
          <button id="copy-config" data-i18n="copyConfig"></button>
          <button id="reset-all" data-i18n="resetCurrentSide"></button>
        </div>
        <h3 data-i18n="logs"></h3>
        <div id="log-view"></div>
        <p class="hint" data-i18n="printHint"></p>
      </aside>
    </div>
  </div>

  <div id="confirm-modal" class="confirm-modal" style="display:none;" role="alertdialog" aria-modal="true">
    <div class="confirm-modal-box">
      <p id="confirm-modal-text"></p>
      <div class="confirm-modal-actions">
        <button id="confirm-modal-cancel" data-i18n="cancel"></button>
        <button id="confirm-modal-ok" class="primary" data-i18n="ok"></button>
      </div>
    </div>
  </div>

  <script src="./studio.js"></script>
</body>
</html>
